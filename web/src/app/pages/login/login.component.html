
<div class="container">
    <div class="row">
        <div class="col-md-4 col-md-offset-4">
            <div class="panel panel-default">
                <div class="panel-heading"><h3 class="panel-title">Please sign in</h3></div>
                <div class="panel-body">
                    <form role="form" (ngSubmit)="login()">
                        <fieldset>
                            <div class="form-group">
                                <p><label>Username: <input class="form-control" placeholder="Username" name="username" [(ngModel)]="username" type="text" /></label></p>
                            </div>
                            <div class="form-group" *ngIf="authType == AuthenticationType.usernamePW">
                                <p><label>Password: <input class="form-control" placeholder="Password" name="password" type="password" [(ngModel)]="password" value="" /></label></p>
                            </div>
                            <div class="form-group" *ngIf="authType == AuthenticationType.usernameOTP">
                                <p><label>OTP Code: <input class="form-control" placeholder="012345" name="otpcode" type="password" [(ngModel)]="otpcode" value="" /></label></p>
                            </div>
                            <div class="form-group">
                                <p>Auth Type: </p>
                                <p><label>Username/Password: <input class="form-control" name="unpw" type="button" value="Username/Password" (click)="setAuthType(AuthenticationType.usernamePW)" /></label></p>
                                <p><label>Username/OTP Code: <input class="form-control" name="unotp" type="button" value="Username/OTP" (click)="setAuthType(AuthenticationType.usernameOTP)" /></label></p>
                            </div><br />
                            <div *ngFor="let error of errors" class="errors"><p>{{ error }}</p></div>
                            <p><input class="submit login" type="submit" value="Login" /></p>
                        </fieldset>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
